# fly.toml app configuration file generated for prepflow on 2026-03-10T21:19:28-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prepflow'
primary_region = 'sjc'

[build]

[env]
  DATA_DIR = '/data'
  HOST = '0.0.0.0'
  PORT = '8080'

[[mounts]]
  source = 'prepflow_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
